<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vorcas Tech Lab - Innovative & Timeless Design</title>
    <meta name="description" content="Vorcas Tech Lab - Engineering the future of digital innovation with powerful web solutions, mobile apps, and custom software." />
    <meta name="theme-color" content="#050505" />
    <meta property="og:title" content="Vorcas Tech Lab - Innovative & Timeless Design" />
    <meta property="og:description" content="Engineering the future of digital innovation with powerful web solutions, mobile apps, and custom software." />
    <meta property="og:image" content="/Vorcaslogo.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" type="image/png" href="/Vorcaslogo.png" />
    <link rel="alternate icon" href="/Vorcaslogo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <style>
      body {
        margin: 0;
        background-color: #000;
      }
      .preloader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #050505;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 99999;
        font-family: 'Outfit', sans-serif;
      }
      .loader-circle {
        position: relative;
        width: 80px;
        height: 80px;
      }
      .loader-circle div {
        box-sizing: border-box;
        display: block;
        position: absolute;
        width: 64px;
        height: 64px;
        margin: 8px;
        border: 4px solid transparent;
        border-radius: 50%;
        animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      }
      .loader-circle div:nth-child(1) {
        animation-delay: -0.45s;
        border-top-color: #fdba74;
      }
      .loader-circle div:nth-child(2) {
        animation-delay: -0.3s;
        border-top-color: #fb923c;
      }
      .loader-circle div:nth-child(3) {
        animation-delay: -0.15s;
        border-top-color: #f97316;
      }
      .loader-circle div:nth-child(4) {
        border-top-color: #ea580c;
        animation-delay: 0s;
      }
      .preloader-text {
        margin-top: 1.5rem;
        font-size: 0.95rem;
        font-weight: 700;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: #fb923c; /* Brighter orange for better contrast */
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(1.05); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="preloader">
        <div class="loader-circle">
          <div></div>
          <div></div>
          <div></div>
          <div></div>
        </div>
        <div class="preloader-text">Loading</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
